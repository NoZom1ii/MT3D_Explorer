<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维地质模型 - 点位导入 + 地下电阻率模型</title>
    <!-- 天地图官方扩展脚本 -->
    <script type="text/javascript" cesium="true" src="https://api.tianditu.gov.cn/cdn/demo/sanwei/static/cesium/Cesium.js"></script>
    <script type="text/javascript" cesium="true" src="https://api.tianditu.gov.cn/cdn/plugins/cesium/Cesium_ext_min.js"></script>
    <script type="text/javascript" cesium="true" src="https://api.tianditu.gov.cn/cdn/plugins/cesium/long.min.js"></script>
    <script type="text/javascript" cesium="true" src="https://api.tianditu.gov.cn/cdn/plugins/cesium/bytebuffer.min.js"></script>
    <script type="text/javascript" cesium="true" src="https://api.tianditu.gov.cn/cdn/plugins/cesium/protobuf.min.js"></script>
    <link rel="stylesheet" cesium="true" href="https://api.tianditu.gov.cn/cdn/demo/sanwei/static/cesium/Widgets/widgets.css">
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; }
        .cesium-widget-credits { display: none; }
        .floating-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(30,30,40,0.85); backdrop-filter: blur(8px); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: white; font-family: sans-serif; min-width: 320px;
        }
        .panel-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; background: rgba(0,0,0,0.5); border-radius: 12px; }
        .panel-header:hover { background: rgba(0,0,0,0.7); }
        .panel-content { padding: 12px 16px; max-height: 500px; overflow-y: auto; transition: max-height 0.3s ease, padding 0.3s ease; }
        .panel-content.collapsed { max-height: 0; padding: 0 16px; overflow: hidden; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: bold; }
        .control-group input, .control-group select, .control-group button { width: 100%; padding: 6px; border-radius: 6px; border: none; background: rgba(255,255,255,0.2); color: white; cursor: pointer; }
        .control-group button { background: #2c6e9e; margin-top: 8px; }
        .control-group button:hover { background: #1e4a6e; }
        .control-group button:disabled { background: #555; cursor: not-allowed; }
        .status { font-size: 12px; margin-top: 8px; color: #ddd; word-break: break-word; }
        hr { border-color: rgba(255,255,255,0.2); margin: 8px 0; }
        .top-right-control {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 8px 16px;
            border-radius: 20px; color: white; font-size: 12px; display: flex;
            flex-direction: column; gap: 8px; border: 1px solid rgba(255,255,255,0.2);
            min-width: 140px;
        }
        .top-right-control > div { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        .top-right-control span { white-space: nowrap; }
        .top-right-control input { width: 100px; cursor: pointer; background: rgba(255,255,255,0.3); }
        .top-right-control button {
            background: #2c6e9e; border: none; color: white; padding: 4px 12px;
            border-radius: 16px; cursor: pointer; width: 100%;
        }
        .top-right-control button:hover { background: #1e4a6e; }
        .colorbar-container {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px;
            color: white; font-size: 12px; text-align: center;
        }
        canvas#colorbarCanvas { width: 30px; height: 200px; display: block; margin: 5px auto; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <!-- 控制面板 -->
    <div class="floating-panel" id="controlPanel">
        <div class="panel-header" id="panelHeader">
            <span>📐 模型控制面板</span>
            <span id="toggleIcon">▲</span>
        </div>
        <div class="panel-content" id="panelContent">
            <div class="control-group">
                <label>📍 步骤1：点位文件（.txt/.csv，每行：经度 纬度 点号(可选)）</label>
                <input type="file" id="pointFileInput" accept=".txt,.csv">
                <div style="margin-top: 5px;">
                    <label><input type="checkbox" id="showPointsCheckbox" checked> 🔘 显示点位</label>
                </div>
            </div>
            <hr>
            <div class="control-group">
                <label>📐 步骤2：网格尺寸文件（.ws）</label>
                <input type="file" id="sizeFileInput">
            </div>
            <div class="control-group">
                <label>⚡ 步骤3：电阻率文件（.xyz，可多选，文件名含深度，如 0km.xyz）<br>文件内第三列为电阻率对数值（log10电阻率）</label>
                <input type="file" id="pointsFileInput" multiple accept=".xyz">
            </div>
            <div class="control-group">
                <label><input type="checkbox" id="coreOnlyCheckbox"> 🔲 仅显示核心区地表网格</label>
            </div>
            <div class="control-group">
                <label>⚡ 电阻率筛选（显示实际电阻率 &lt; 阈值的单元）</label>
                <input type="text" id="resistivityThreshold" placeholder="例如: 100" value="100">
            </div>
            <div class="control-group">
                <button id="filterAndShowBtn" disabled>🔍 筛选并显示地下单元</button>
                <button id="clearModelsBtn" disabled>🗑️ 清除所有地下单元</button>
            </div>
            <div class="control-group">
                <label>🗑️ 浅层清除（移除深度 &lt; 阈值的层）</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="shallowDepth" placeholder="深度阈值 (km)" value="1">
                    <button id="shallowClearBtn" disabled>清除浅层</button>
                </div>
            </div>
            <div class="control-group">
                <button id="drawGridBtn" disabled>🧩 绘制地表网格（重新加载所有电阻率文件）</button>
            </div>
            <div id="status" class="status">等待文件...</div>
        </div>
    </div>

    <!-- 右上角控件 -->
    <div class="top-right-control">
        <div>
            <span>🌍 地球透明度</span>
            <input type="range" id="globeAlphaSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
        <button id="homeBtn" disabled>🏠 Home (核心区上空20万km)</button>
    </div>

    <div class="colorbar-container" id="colorbarContainer" style="display: none;">
        <div>电阻率 (Ω·m)</div>
        <canvas id="colorbarCanvas" width="30" height="200"></canvas>
        <div id="colorbarMin">—</div>
        <div id="colorbarMax">—</div>
    </div>

    <script>
        // ==================== 天地图配置 ====================
        const token = '416f0b679ea2e217fbe325ead88ae8c9';
        const tdtUrl = 'https://t{s}.tianditu.gov.cn/';
        const subdomains = ['0','1','2','3','4','5','6','7'];

        const viewer = new Cesium.Viewer('cesiumContainer', {
            shouldAnimate: true,
            selectionIndicator: false,
            baseLayerPicker: false,
            fullscreenButton: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            sceneModePicker: false,
            timeline: false,
            navigationHelpButton: false,
            navigationInstructionsInitiallyVisible: false,
            showRenderLoopErrors: false,
            shadows: false,
            imageryProvider: false
        });

        // 影像层
        const imgMap = new Cesium.UrlTemplateImageryProvider({
            url: tdtUrl + 'DataServer?T=img_w&x={x}&y={y}&l={z}&tk=' + token,
            subdomains: subdomains,
            tilingScheme: new Cesium.WebMercatorTilingScheme(),
            maximumLevel: 18
        });
        viewer.imageryLayers.addImageryProvider(imgMap);

        // 国界/注记层
        const iboMap = new Cesium.UrlTemplateImageryProvider({
            url: tdtUrl + 'DataServer?T=ibo_w&x={x}&y={y}&l={z}&tk=' + token,
            subdomains: subdomains,
            tilingScheme: new Cesium.WebMercatorTilingScheme(),
            maximumLevel: 10
        });
        viewer.imageryLayers.addImageryProvider(iboMap);

        // 地形服务（可能因CORS无法使用，可注释）
        try {
            const terrainUrls = [];
            for (let i = 0; i < subdomains.length; i++) {
                terrainUrls.push(`https://t${subdomains[i]}.tianditu.gov.cn/mapservice/swdx?T=elv_c&tk=${token}`);
            }
            const terrainProvider = new Cesium.GeoTerrainProvider({ urls: terrainUrls });
            viewer.terrainProvider = terrainProvider;
        } catch (e) { console.warn("地形服务不可用", e); }

        // 三维地名服务
        const wtfs = new Cesium.GeoWTFS({
            viewer: viewer,
            subdomains: subdomains,
            metadata: { boundBox: { minX: -180, minY: -90, maxX: 180, maxY: 90 }, minLevel: 1, maxLevel: 20 },
            depthTestOptimization: true,
            dTOElevation: 15000,
            dTOPitch: Cesium.Math.toRadians(-70),
            aotuCollide: true,
            collisionPadding: [5, 10, 8, 5],
            serverFirstStyle: true,
            labelGraphics: { font: "28px sans-serif", fontSize: 28, fillColor: Cesium.Color.WHITE, scale: 0.5, outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE },
            billboardGraphics: { width: 18, height: 18, color: Cesium.Color.WHITE }
        });
        wtfs.getTileUrl = function() { return tdtUrl + 'mapservice/GetTiles?lxys={z},{x},{y}&VERSION=1.0.0&tk=' + token; };
        wtfs.getIcoUrl = function() { return tdtUrl + 'mapservice/GetIcon?id={id}&tk=' + token; };
        wtfs.initTDT([]); // 简化，实际可留空

        // 透明度控制
        const alphaSlider = document.getElementById('globeAlphaSlider');
        alphaSlider.addEventListener('input', (e) => {
            const alpha = parseFloat(e.target.value);
            if (viewer.imageryLayers.length) viewer.imageryLayers.get(0).alpha = alpha;
            viewer.scene.globe.baseColor = new Cesium.Color(1,1,1,alpha);
        });
        alphaSlider.dispatchEvent(new Event('input'));

        // 折叠面板
        const panelContent = document.getElementById('panelContent');
        const toggleIcon = document.getElementById('toggleIcon');
        document.getElementById('panelHeader').addEventListener('click', () => {
            const isCollapsed = panelContent.classList.toggle('collapsed');
            toggleIcon.innerText = isCollapsed ? '▼' : '▲';
        });

        // ==================== 点位数据管理 ====================
        let pointEntities = [];
        const pointFileInput = document.getElementById('pointFileInput');
        const showPointsCheckbox = document.getElementById('showPointsCheckbox');

        function parsePointsFile(content) {
            const lines = content.split(/\r?\n/);
            const points = [];
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line === '') continue;
                const parts = line.split(/\s+/);
                if (parts.length < 2) continue;
                const lng = parseFloat(parts[0]);
                const lat = parseFloat(parts[1]);
                if (isNaN(lng) || isNaN(lat)) continue;
                let label = (parts.length >= 3) ? parts[2] : (i+1).toString();
                const uniqueId = `point_${Date.now()}_${i}_${Math.random().toString(36).substr(2,6)}`;
                points.push({ lng, lat, label, uniqueId });
            }
            return points;
        }

        function addPointsToViewer(points) {
            for (let e of pointEntities) viewer.entities.remove(e);
            pointEntities = [];
            for (let p of points) {
                const entity = viewer.entities.add({
                    id: p.uniqueId,
                    position: Cesium.Cartesian3.fromDegrees(p.lng, p.lat),
                    point: { pixelSize: 10, color: Cesium.Color.AQUA, outlineColor: Cesium.Color.BLUE, outlineWidth: 2, disableDepthTestDistance: Number.POSITIVE_INFINITY },
                    label: { text: p.label, font: '16px "微软雅黑", sans-serif', fillColor: Cesium.Color.BLACK, outlineColor: Cesium.Color.WHITE, outlineWidth: 2, pixelOffset: new Cesium.Cartesian2(0,-15), disableDepthTestDistance: Number.POSITIVE_INFINITY }
                });
                pointEntities.push(entity);
            }
            const visible = showPointsCheckbox.checked;
            pointEntities.forEach(e => e.show = visible);
        }

        pointFileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const points = parsePointsFile(e.target.result);
                    addPointsToViewer(points);
                    document.getElementById('status').innerHTML += `<br>✅ 已加载 ${points.length} 个点位。`;
                } catch (err) {
                    document.getElementById('status').innerHTML += `<br>❌ 点位解析失败: ${err.message}`;
                }
            };
            reader.readAsText(file, 'UTF-8');
        });

        showPointsCheckbox.addEventListener('change', () => {
            const visible = showPointsCheckbox.checked;
            pointEntities.forEach(e => e.show = visible);
        });

        // ==================== 电阻率模型核心代码 ====================
        let gridHeights = null, gridWidths = null;
        let sizeFileLoaded = false;
        let allSurfaceCells = [];
        let coreCells = [];
        let cubesDatabase = [];
        let currentDisplayedModels = [];
        const drawBtn = document.getElementById('drawGridBtn');
        const filterBtn = document.getElementById('filterAndShowBtn');
        const clearBtn = document.getElementById('clearModelsBtn');
        const shallowClearBtn = document.getElementById('shallowClearBtn');
        const homeBtn = document.getElementById('homeBtn');
        const sizeInput = document.getElementById('sizeFileInput');
        const pointsInput = document.getElementById('pointsFileInput');
        const thresholdInput = document.getElementById('resistivityThreshold');
        const shallowDepthInput = document.getElementById('shallowDepth');

        function enableDrawButton() { drawBtn.disabled = false; }
        function disableDrawButton() { drawBtn.disabled = true; }
        function enableFilterButtons() {
            filterBtn.disabled = false; clearBtn.disabled = false;
            shallowClearBtn.disabled = false; homeBtn.disabled = false;
        }
        function disableFilterButtons() {
            filterBtn.disabled = true; clearBtn.disabled = true;
            shallowClearBtn.disabled = true; homeBtn.disabled = true;
        }

        sizeInput.addEventListener('change', enableDrawButton);
        pointsInput.addEventListener('change', enableDrawButton);

        // 解析尺寸文件（回文对称，整数）
        function parseSizeFile(content) {
            const lines = content.split(/\r?\n/);
            const numbers = [];
            for (let i = 2; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') continue;
                const parts = line.split(/\s+/);
                for (let p of parts) {
                    const num = parseFloat(p);
                    if (isNaN(num)) continue;
                    if (Math.abs(num - Math.round(num)) > 1e-6) throw new Error(`尺寸必须为整数: ${num}`);
                    numbers.push(Math.round(num));
                }
            }
            if (numbers.length < 4) throw new Error("有效数字不足");
            let idx = 0;
            const heights = [];
            const vertStart = numbers[idx];
            heights.push(vertStart);
            idx++;
            while (idx < numbers.length) {
                const val = numbers[idx];
                heights.push(val);
                idx++;
                if (val === vertStart) break;
            }
            if (heights.length < 2) throw new Error("竖直方向不完整");
            if (idx >= numbers.length) throw new Error("无水平方向数据");
            const widths = [];
            const horStart = numbers[idx];
            widths.push(horStart);
            idx++;
            while (idx < numbers.length) {
                const val = numbers[idx];
                widths.push(val);
                idx++;
                if (val === horStart) break;
            }
            if (widths.length < 2) throw new Error("水平方向不完整");
            return { heights, widths };
        }

        // 解析电阻率文件（含深度，第三列为对数电阻率）
        async function parseResistivityFile(file) {
            const fileName = file.name;
            const depthMatch = fileName.match(/(\d+(?:\.\d+)?)\s*(km|m)/i);
            if (!depthMatch) throw new Error(`文件名缺少深度: ${fileName}`);
            let depth = parseFloat(depthMatch[1]);
            if (depthMatch[2].toLowerCase() === 'km') depth *= 1000;
            const content = await file.text();
            const lines = content.split(/\r?\n/);
            const points = [];
            for (let line of lines) {
                line = line.trim();
                if (line === '') continue;
                const parts = line.split(/\s+/);
                if (parts.length < 3) throw new Error(`行数据不足: ${line}`);
                const lng = parseFloat(parts[0]);
                const lat = parseFloat(parts[1]);
                const rho_log = parseFloat(parts[2]);
                if (isNaN(lng) || isNaN(lat) || isNaN(rho_log)) continue;
                points.push({ lng, lat, resistivity: Math.pow(10, rho_log) });
            }
            if (!points.length) throw new Error(`无有效数据: ${fileName}`);
            return { depth, points };
        }

        function findMode(arr) {
            if (!arr.length) return null;
            const freq = new Map();
            for (let v of arr) freq.set(v, (freq.get(v)||0)+1);
            let mode = arr[0], maxCount = 0;
            for (let [v,c] of freq) if (c > maxCount) { maxCount = c; mode = v; }
            return mode;
        }

        function offsetByMeters(lng, lat, east, north) {
            const latRad = lat * Math.PI / 180;
            const perDegLat = 111320;
            const perDegLng = 111320 * Math.cos(latRad);
            return { lng: lng + east / perDegLng, lat: lat + north / perDegLat };
        }

        function getColorFromResistivity(rho, minRho, maxRho) {
            if (minRho === maxRho) return Cesium.Color.RED;
            let t = (rho - minRho) / (maxRho - minRho);
            let hue = 0.8 * t;  // 低阻红(hue=0) -> 高阻紫(hue=0.8)
            return Cesium.Color.fromHsl(hue, 1.0, 0.5);
        }

        function drawColorbar(minVal, maxVal) {
            const canvas = document.getElementById('colorbarCanvas');
            const ctx = canvas.getContext('2d');
            const w = 30, h = 200;
            canvas.width = w; canvas.height = h;
            const imgData = ctx.createImageData(w, h);
            for (let y = 0; y < h; y++) {
                const t = 1 - y / h;
                const hue = 0.8 * t;
                const rgb = Cesium.Color.fromHsl(hue, 1.0, 0.5);
                const r = Math.floor(rgb.red*255), g = Math.floor(rgb.green*255), b = Math.floor(rgb.blue*255);
                for (let x = 0; x < w; x++) {
                    const idx = (y*w + x)*4;
                    imgData.data[idx]=r; imgData.data[idx+1]=g; imgData.data[idx+2]=b; imgData.data[idx+3]=255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            document.getElementById('colorbarMin').innerText = minVal.toFixed(2);
            document.getElementById('colorbarMax').innerText = maxVal.toFixed(2);
        }

        function clearAllEntities() {
            viewer.entities.values.forEach(e => viewer.entities.remove(e));
            currentDisplayedModels = [];
        }

        function renderSurfaceGrid(onlyCore) {
            for (let cell of allSurfaceCells) {
                const { lng, lat, width, height, id, isCore } = cell;
                const br = offsetByMeters(lng, lat, width, 0);
                const tl = offsetByMeters(lng, lat, 0, height);
                const tr = offsetByMeters(lng, lat, width, height);
                const positions = [
                    Cesium.Cartesian3.fromDegrees(lng, lat),
                    Cesium.Cartesian3.fromDegrees(br.lng, br.lat),
                    Cesium.Cartesian3.fromDegrees(tr.lng, tr.lat),
                    Cesium.Cartesian3.fromDegrees(tl.lng, tl.lat)
                ];
                const entity = viewer.entities.add({
                    id: id,
                    polygon: { hierarchy: new Cesium.PolygonHierarchy(positions), material: Cesium.Color.RED.withAlpha(0.4), outline: true, outlineColor: Cesium.Color.BLACK, outlineWidth: 1 }
                });
                entity.show = (onlyCore ? isCore : true);
            }
        }

        function buildModelsFromCubes(cubes, minRho, maxRho) {
            const models = [];
            for (let cube of cubes) {
                const { lng, lat, width, height, thickness, layerCenter, resistivity_real } = cube;
                const color = getColorFromResistivity(resistivity_real, minRho, maxRho);
                const halfW = width/2, halfH = height/2;
                const center = offsetByMeters(lng, lat, halfW, halfH);
                const boxCenter = Cesium.Cartesian3.fromDegrees(center.lng, center.lat, -layerCenter);
                const entity = viewer.entities.add({
                    id: `cube_${cube.layerIndex}_${cube.row}_${cube.col}`,
                    position: boxCenter,
                    box: { dimensions: new Cesium.Cartesian3(width, height, thickness), material: color.withAlpha(0.7), outline: false },
                    disableDepthTestDistance: Number.POSITIVE_INFINITY
                });
                models.push(entity);
            }
            return models;
        }

        async function drawAll() {
            const statusDiv = document.getElementById('status');
            if (!sizeFileLoaded) { statusDiv.innerHTML = '⚠️ 请先加载尺寸文件'; return; }
            if (pointsInput.files.length === 0) { statusDiv.innerHTML = '⚠️ 请至少选择一个电阻率文件'; return; }
            try {
                const rawLayers = [];
                for (let file of pointsInput.files) {
                    try {
                        const { depth, points } = await parseResistivityFile(file);
                        rawLayers.push({ depth, points, fileName: file.name });
                    } catch (err) { statusDiv.innerHTML += `<br>❌ 解析失败: ${file.name} - ${err.message}`; }
                }
                if (!rawLayers.length) throw new Error("无有效电阻率文件");
                rawLayers.sort((a,b) => a.depth - b.depth);
                const surfaceLayer = rawLayers.find(l => Math.abs(l.depth) < 1e-6);
                const basePoints = surfaceLayer ? surfaceLayer.points : rawLayers[0].points;
                const M = gridHeights.length, N = gridWidths.length;
                if (basePoints.length !== M*N) throw new Error(`点数(${basePoints.length})与网格(${M}x${N})不匹配`);
                const coreH = findMode(gridHeights), coreW = findMode(gridWidths);
                const cells = [], coreList = [];
                for (let i=0; i<M; i++) {
                    for (let j=0; j<N; j++) {
                        const { lng, lat } = basePoints[i*N+j];
                        const isCore = (gridHeights[i] === coreH && gridWidths[j] === coreW);
                        const cell = { id: `cell_${i}_${j}`, row: i, col: j, lng, lat, width: gridWidths[j], height: gridHeights[i], isCore };
                        cells.push(cell);
                        if (isCore) coreList.push(cell);
                    }
                }
                allSurfaceCells = cells; coreCells = coreList;
                const sortedNonZero = rawLayers.filter(l => l.depth > 1e-6).sort((a,b)=>a.depth-b.depth);
                const layersData = [];
                let prevDepth = 0;
                for (let l of sortedNonZero) {
                    const thickness = l.depth - prevDepth;
                    if (thickness <= 0) continue;
                    const full = l.points.map(p => p.resistivity);
                    const coreRes = [];
                    let ok = true;
                    for (let cell of coreList) {
                        const idx = cell.row * N + cell.col;
                        if (idx >= full.length) { ok = false; break; }
                        coreRes.push(full[idx]);
                    }
                    if (!ok) continue;
                    layersData.push({ depth: l.depth, thickness, resistivityValues: coreRes });
                    prevDepth = l.depth;
                }
                if (!layersData.length) throw new Error("无有效层数据");
                cubesDatabase = [];
                let cumDepth = 0;
                for (let idx=0; idx<layersData.length; idx++) {
                    const layer = layersData[idx];
                    const center = cumDepth + layer.thickness/2;
                    cumDepth += layer.thickness;
                    for (let i=0; i<coreCells.length; i++) {
                        const cell = coreCells[i];
                        cubesDatabase.push({
                            layerIndex: idx, depth: layer.depth, thickness: layer.thickness, layerCenter: center,
                            width: cell.width, height: cell.height, lng: cell.lng, lat: cell.lat,
                            resistivity_real: layer.resistivityValues[i], row: cell.row, col: cell.col
                        });
                    }
                }
                clearAllEntities();
                renderSurfaceGrid(document.getElementById('coreOnlyCheckbox').checked);
                let minR=Infinity, maxR=-Infinity;
                for (let c of cubesDatabase) { if (c.resistivity_real<minR) minR=c.resistivity_real; if (c.resistivity_real>maxR) maxR=c.resistivity_real; }
                drawColorbar(minR, maxR);
                document.getElementById('colorbarContainer').style.display = 'block';
                statusDiv.innerHTML = `✅ 数据加载完成 | 核心区单元格: ${coreCells.length}<br>有效层数: ${layersData.length}<br>立方体总数: ${cubesDatabase.length}<br>电阻率范围: ${minR.toFixed(2)}~${maxR.toFixed(2)} Ω·m`;
                disableDrawButton();
                enableFilterButtons();
                for (let m of currentDisplayedModels) viewer.entities.remove(m);
                currentDisplayedModels = [];
            } catch(err) { statusDiv.innerHTML = `❌ 绘制出错: ${err.message}`; console.error(err); enableDrawButton(); disableFilterButtons(); }
        }

        async function filterAndShow() {
            if (!cubesDatabase.length) { alert("请先绘制地表网格"); return; }
            const threshText = thresholdInput.value.trim();
            if (!threshText) { alert("请输入阈值"); return; }
            let op = '<', valStr = threshText;
            if (threshText.includes('<=')) { op='<='; valStr=threshText.split('<=')[1].trim(); }
            else if (threshText.includes('<')) { op='<'; valStr=threshText.split('<')[1].trim(); }
            else if (threshText.includes('>=')) { op='>='; valStr=threshText.split('>=')[1].trim(); }
            else if (threshText.includes('>')) { op='>'; valStr=threshText.split('>')[1].trim(); }
            const threshold = parseFloat(valStr);
            if (isNaN(threshold)) { alert("阈值必须是数字"); return; }
            let filtered = cubesDatabase.filter(cube => {
                if (op === '<') return cube.resistivity_real < threshold;
                if (op === '<=') return cube.resistivity_real <= threshold;
                if (op === '>') return cube.resistivity_real > threshold;
                if (op === '>=') return cube.resistivity_real >= threshold;
                return false;
            });
            if (!filtered.length) { alert("无符合条件的立方体"); return; }
            if (filtered.length > 5000 && !confirm(`将显示 ${filtered.length} 个立方体，可能卡顿，继续？`)) return;
            for (let m of currentDisplayedModels) viewer.entities.remove(m);
            let minR=Infinity, maxR=-Infinity;
            for (let c of filtered) { if (c.resistivity_real<minR) minR=c.resistivity_real; if (c.resistivity_real>maxR) maxR=c.resistivity_real; }
            currentDisplayedModels = buildModelsFromCubes(filtered, minR, maxR);
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML += `<br>🔍 筛选显示: ${filtered.length} 个立方体 (${op} ${threshold})，电阻率范围 ${minR.toFixed(2)}~${maxR.toFixed(2)} Ω·m`;
        }

        function clearModels() {
            for (let m of currentDisplayedModels) viewer.entities.remove(m);
            currentDisplayedModels = [];
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = statusDiv.innerHTML.replace(/<br>🔍 筛选显示:.*/, '');
        }

        function shallowClear() {
            if (!cubesDatabase.length) { alert("请先绘制地表网格"); return; }
            const threshKm = parseFloat(shallowDepthInput.value);
            if (isNaN(threshKm) || threshKm <= 0) { alert("输入有效深度阈值(km)"); return; }
            const threshM = threshKm * 1000;
            const newDB = cubesDatabase.filter(cube => cube.depth >= threshM);
            const removed = cubesDatabase.length - newDB.length;
            if (!removed) { alert("无立方体被清除"); return; }
            cubesDatabase = newDB;
            for (let m of currentDisplayedModels) viewer.entities.remove(m);
            currentDisplayedModels = [];
            let minR=Infinity, maxR=-Infinity;
            for (let c of cubesDatabase) { if (c.resistivity_real<minR) minR=c.resistivity_real; if (c.resistivity_real>maxR) maxR=c.resistivity_real; }
            if (minR !== Infinity) drawColorbar(minR, maxR);
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = statusDiv.innerHTML.replace(/立方体总数: \d+/, `立方体总数: ${cubesDatabase.length}`);
            statusDiv.innerHTML += `<br>🗑️ 已清除 ${removed} 个深度 < ${threshKm} km 的立方体。`;
        }

        function setHomeView() {
            if (!coreCells.length) { alert("请先绘制地表网格"); return; }
            let sumLng=0, sumLat=0;
            for (let cell of coreCells) { sumLng += cell.lng; sumLat += cell.lat; }
            const centerLng = sumLng / coreCells.length;
            const centerLat = sumLat / coreCells.length;
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(centerLng, centerLat, 200000000),
                orientation: { heading: Cesium.Math.toRadians(180), pitch: Cesium.Math.toRadians(-45), roll: 0 },
                duration: 2
            });
        }

        drawBtn.addEventListener('click', drawAll);
        filterBtn.addEventListener('click', filterAndShow);
        clearBtn.addEventListener('click', clearModels);
        shallowClearBtn.addEventListener('click', shallowClear);
        homeBtn.addEventListener('click', setHomeView);
        document.getElementById('coreOnlyCheckbox').addEventListener('change', () => {
            const onlyCore = document.getElementById('coreOnlyCheckbox').checked;
            for (let cell of allSurfaceCells) {
                const entity = viewer.entities.getById(cell.id);
                if (entity) entity.show = onlyCore ? cell.isCore : true;
            }
        });

        // 初始相机
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(103.84, 31.15, 17850000),
            orientation: { heading: Cesium.Math.toRadians(348.42), pitch: Cesium.Math.toRadians(-89.74), roll: 0 },
            duration: 2
        });
    </script>
</body>
